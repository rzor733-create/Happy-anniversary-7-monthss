<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Calico Cat - Kallita Room</title>
    <style>
        :root {
            --bg-color: #F0E6EF;
            --panel-color: rgba(255, 255, 255, 0.85);
            --text-color: #6C5B7B;
            --accent-color: #F8B195;
            --border-color: #C06C84;
        }
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            padding: 4px;
            transition: background-color 2s ease;
        }
        #game-container {
            position: relative;
            width: min(98vw, 96vh * 1.3333);
            max-width: 1200px;
            aspect-ratio: 4/3;
            background: #fff;
            border: 6px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
        }
        .interactive {
            pointer-events: auto;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .btn {
            background: var(--panel-color);
            border: 3px solid var(--text-color);
            border-radius: 8px;
            color: var(--text-color);
            padding: 6px 12px;
            font-family: inherit;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--text-color);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--text-color);
        }
        #audio-toggle {
            padding: 3px 7px;
            font-size: 10px;
            border-width: 2px;
            box-shadow: 0 2px 0 var(--text-color);
            border-radius: 6px;
            gap: 3px;
            min-width: auto;
        }
        #audio-toggle:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 var(--text-color);
        }
        .bottom-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }
        #tug-overlay {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel-color);
            border: 4px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            display: none;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.1);
        }
        .meter-container {
            width: 100%;
            height: 20px;
            background: #E0E0E0;
            border: 2px solid var(--text-color);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
            position: relative;
        }
        #tug-meter {
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #FFB3BA, #FFDFBA);
            transition: width 0.1s ease;
        }
        #status-msg {
            background: rgba(255, 255, 255, 0.7);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
        }
        #hint-text {
            background: rgba(255, 255, 255, 0.55);
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 9px;
            text-align: center;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="256" height="192"></canvas>
        <div id="ui-layer">
            <div class="top-bar">
                <div id="status-msg">Day 1</div><button class="btn interactive" id="audio-toggle">🔊</button>
            </div>
            <div style="flex:1;display:flex;align-items:center;justify-content:center;pointer-events:none;"><span id="hint-text">🐾 Click floor to throw treats • Drag toys • Pat the cat! • 🎸 Play guitar! • 🐭 Shake to release rat!</span></div>
            <div id="tug-overlay">
                <div style="font-size:12px;margin-bottom:2px;">🐟 TUG OF WAR! 🐟</div>
                <div style="font-size:10px;color:var(--border-color)">Click repeatedly to pull!</div>
                <div class="meter-container"><div id="tug-meter"></div></div>
            </div>
            <div class="bottom-bar">
                <button class="btn interactive" id="feed-btn">🍖 Feed Bowl</button>
                <button class="btn interactive" id="water-btn">💧 Fill Water</button>
                <button class="btn interactive" id="treat-btn">🍬 Throw Treat</button>
                <button class="btn interactive" id="reset-btn" style="font-size:10px;padding:4px 8px;border-color:#aaa;color:#aaa;box-shadow:0 2px 0 #aaa;">Reset</button>
            </div>
        </div>
    </div>
    <script>
        (function() {
            const sfx = {
                init() { if (!this.ctx) this.ctx = new(window.AudioContext || window.webkitAudioContext) },
                muted: !1,
                playPurr() { if (this.muted || !this.ctx) return; let o = this.ctx.createOscillator(),
                        g = this.ctx.createGain();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(25, this.ctx.currentTime);
                    let f = this.ctx.createBiquadFilter();
                    f.type = 'lowpass';
                    f.frequency.setValueAtTime(120, this.ctx.currentTime);
                    g.gain.setValueAtTime(.3, this.ctx.currentTime);
                    g.gain.linearRampToValueAtTime(.01, this.ctx.currentTime + .4);
                    o.connect(f);
                    f.connect(g);
                    g.connect(this.ctx.destination);
                    o.start();
                    o.stop(this.ctx.currentTime + .4) },
                playMeow() { if (this.muted || !this.ctx) return; let o = this.ctx.createOscillator(),
                        g = this.ctx.createGain();
                    o.type = 'triangle';
                    o.frequency.setValueAtTime(400, this.ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(650, this.ctx.currentTime + .1);
                    o.frequency.exponentialRampToValueAtTime(500, this.ctx.currentTime + .25);
                    g.gain.setValueAtTime(.15, this.ctx.currentTime);
                    g.gain.linearRampToValueAtTime(.01, this.ctx.currentTime + .25);
                    o.connect(g);
                    g.connect(this.ctx.destination);
                    o.start();
                    o.stop(this.ctx.currentTime + .25) },
                playCrunch() { if (this.muted || !this.ctx) return; let s = this.ctx.sampleRate * .08,
                        b = this.ctx.createBuffer(1, s, this.ctx.sampleRate),
                        d = b.getChannelData(0); for (let i = 0; i < s; i++) d[i] = Math.random() * 2 - 1;
                    let n = this.ctx.createBufferSource();
                    n.buffer = b;
                    let f = this.ctx.createBiquadFilter();
                    f.type = 'bandpass';
                    f.frequency.setValueAtTime(1e3, this.ctx.currentTime);
                    let g = this.ctx.createGain();
                    g.gain.setValueAtTime(.1, this.ctx.currentTime);
                    g.gain.linearRampToValueAtTime(.01, this.ctx.currentTime + .08);
                    n.connect(f);
                    f.connect(g);
                    g.connect(this.ctx.destination);
                    n.start() },
                playYawn() { if (this.muted || !this.ctx) return; let o = this.ctx.createOscillator(),
                        g = this.ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(300, this.ctx.currentTime);
                    o.frequency.linearRampToValueAtTime(150, this.ctx.currentTime + .6);
                    g.gain.setValueAtTime(.08, this.ctx.currentTime);
                    g.gain.linearRampToValueAtTime(.001, this.ctx.currentTime + .6);
                    o.connect(g);
                    g.connect(this.ctx.destination);
                    o.start();
                    o.stop(this.ctx.currentTime + .6) },
                playSqueak() { if (this.muted || !this.ctx) return; let o = this.ctx.createOscillator(),
                        g = this.ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(1800, this.ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(2400, this.ctx.currentTime + .05);
                    o.frequency.exponentialRampToValueAtTime(1600, this.ctx.currentTime + .12);
                    g.gain.setValueAtTime(.08, this.ctx.currentTime);
                    g.gain.linearRampToValueAtTime(.01, this.ctx.currentTime + .12);
                    o.connect(g);
                    g.connect(this.ctx.destination);
                    o.start();
                    o.stop(this.ctx.currentTime + .12) },
                playPatMeow() { if (this.muted || !this.ctx) return; let o = this.ctx.createOscillator(),
                        g = this.ctx.createGain();
                    o.type = 'triangle';
                    o.frequency.setValueAtTime(500, this.ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(700, this.ctx.currentTime + .08);
                    o.frequency.exponentialRampToValueAtTime(550, this.ctx.currentTime + .18);
                    g.gain.setValueAtTime(.12, this.ctx.currentTime);
                    g.gain.linearRampToValueAtTime(.01, this.ctx.currentTime + .18);
                    o.connect(g);
                    g.connect(this.ctx.destination);
                    o.start();
                    o.stop(this.ctx.currentTime + .18) },
                playPop() { if (this.muted || !this.ctx) return; let o = this.ctx.createOscillator(),
                        g = this.ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(600, this.ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + .15);
                    g.gain.setValueAtTime(.1, this.ctx.currentTime);
                    g.gain.linearRampToValueAtTime(.001, this.ctx.currentTime + .15);
                    o.connect(g);
                    g.connect(this.ctx.destination);
                    o.start();
                    o.stop(this.ctx.currentTime + .15) },
                playGulp() { if (this.muted || !this.ctx) return; let o = this.ctx.createOscillator(),
                        g = this.ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(200, this.ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + .1);
                    g.gain.setValueAtTime(.08, this.ctx.currentTime);
                    g.gain.linearRampToValueAtTime(.001, this.ctx.currentTime + .1);
                    o.connect(g);
                    g.connect(this.ctx.destination);
                    o.start();
                    o.stop(this.ctx.currentTime + .1) },
                playGuitar(n = 0) { if (this.muted || !this.ctx) return;
                    const N = [82.41, 110, 146.83, 196, 246.94, 329.63],
                        f = N[n % 6] * (1 + Math.random() * .02);
                    let o = this.ctx.createOscillator(),
                        o2 = this.ctx.createOscillator(),
                        g = this.ctx.createGain(),
                        fl = this.ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o2.type = 'triangle';
                    o.frequency.setValueAtTime(f, this.ctx.currentTime);
                    o2.frequency.setValueAtTime(f * 2, this.ctx.currentTime);
                    fl.type = 'lowpass';
                    fl.frequency.setValueAtTime(2e3, this.ctx.currentTime);
                    fl.frequency.exponentialRampToValueAtTime(400, this.ctx.currentTime + .5);
                    g.gain.setValueAtTime(.15, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(.01, this.ctx.currentTime + .6);
                    o.connect(fl);
                    o2.connect(fl);
                    fl.connect(g);
                    g.connect(this.ctx.destination);
                    o.start();
                    o2.start();
                    o.stop(this.ctx.currentTime + .6);
                    o2.stop(this.ctx.currentTime + .6) },
                playGuitarStrum() { if (this.muted || !this.ctx) return; for (let i = 0; i < 6; i++) setTimeout(() => this
                        .playGuitar(i), i * 30) }
            };

            const canvas = document.getElementById('gameCanvas'),
                ctx = canvas.getContext('2d'),
                W = 256,
                H = 192,
                FL = H - 24;
            let S = { petCount: 0, hasPetSpeechChanged: !1, fatLevel: 1, foodSpawned: !1, foodX: 0, foodY: 0,
                foodAmount: 0, timeOfDay: 0, shakeTracker: 0, catShakeTracker: 0, lastMouseX: 0, lastMouseY: 0,
                treatSpawned: !1, treatX: 0, treatY: 0, treatEatenCount: 0, waterLevel: 100, waterBowlX: 95,
                waterBowlY: FL, lightsOn: !0 };
            const cabinet = { x: 115, y: FL - 42, w: 36, h: 42, isUpperOpen: !1, isLowerOpen: !1, isLetterVisible: !1 };
            const bed = { x: 40, y: FL - 12, w: 46, h: 12 };
            const catClimber = { x: 235, baseY: FL, platforms: [{ y: FL - 25, w: 24, h: 7 }, { y: FL - 50, w: 22, h: 7 }, {
                y: FL - 75,
                w: 20,
                h: 7
            }, { y: FL - 100, w: 18, h: 7 }], poleWidth: 5 };
            const toyPile = { x: 165, y: FL - 8, w: 40, h: 18 };
            const rug = { x: 50, y: FL + 6, w: 156, h: 14 };
            const ratHole = { x: 10, y: FL - 18, w: 24, h: 18 };
            const cheese = { x: ratHole.x - 7, y: FL - 2, size: 5, active: !0, nibblesLeft: 3, regenTimer: 0 };
            const guitar = { x: 92, y: FL - 20, w: 18, h: 40, isBeingPlayed: !1 };
            const glassCabinet = { x: 170, y: 28, w: 50, h: 55 };
            const smallShelf = { x: 5, y: 66 };
            const lightSwitch = { x: 10, y: 10, w: 10, h: 14 };
            const P = { white: '#FFFFFF', orange: '#E68A4E', black: '#3D3D43', pink: '#FFB3BA', shadow: '#D5C3D3',
                floorDay: '#F7E7CE', floorNight: '#A899B5', wallDay: '#FFF5EB', wallNight: '#5B507A', ball: '#FF6F91',
                fish: '#845EC2', woodDark: '#8B4513', woodLight: '#A0522D', woodNightDark: '#4A2F1D',
                woodNightLight: '#5C3A21', toscaBlue: '#40E0D0' };
            const HAT_OPTIONS = [null, 'flower_crown', 'top_hat', 'bow_ribbon'];
            const OUTFIT_OPTIONS = [null, 'sweater', 'bowtie', 'scarf'];
            const HAT_NAMES = { 'flower_crown': '🌸 Crown', 'top_hat': '🎩 Top Hat', 'bow_ribbon': '🎀 Bow' };
            const OUTFIT_NAMES = { 'sweater': '🧶 Sweater', 'bowtie': '🎀 Bowtie', 'scarf': '🧣 Scarf' };

            const windowX = W / 2 - 25,
                windowY = 25,
                windowW = 50,
                windowH = 40;
            const fixedStars = [];
            for (let i = 0; i < 14; i++) {
                fixedStars.push({
                    x: windowX + 4 + Math.random() * (windowW - 8),
                    y: windowY + 3 + Math.random() * (windowH / 2 - 4)
                });
            }
            const fixedBirds = [];
            for (let i = 0; i < 4; i++) {
                fixedBirds.push({
                    x: windowX + 5 + Math.random() * (windowW - 15),
                    y: windowY + 24 + Math.random() * 12,
                    wingPhase: Math.random() * Math.PI * 2,
                    size: 3 + Math.floor(Math.random() * 3)
                });
            }

            function darkenColor(hex, factor) {
                let r = parseInt(hex.slice(1, 3), 16),
                    g = parseInt(hex.slice(3, 5), 16),
                    b = parseInt(hex.slice(5, 7), 16);
                r = Math.floor(r * (1 - factor));
                g = Math.floor(g * (1 - factor));
                b = Math.floor(b * (1 - factor));
                return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
            }

            function lightenColor(hex, factor) {
                let r = parseInt(hex.slice(1, 3), 16),
                    g = parseInt(hex.slice(3, 5), 16),
                    b = parseInt(hex.slice(5, 7), 16);
                r = Math.floor(r + (255 - r) * factor);
                g = Math.floor(g + (255 - g) * factor);
                b = Math.floor(b + (255 - b) * factor);
                return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
            }

            class Particle {
                constructor(x, y, t, tt = '') { this.x = x;
                    this.y = y;
                    this.type = t;
                    this.text = tt;
                    this.vx = (Math.random() - .5) * 1;
                    this.vy = t === 'crumb' ? -Math.random() * 1.5 : -Math.random() * .6 - .2;
                    this.life = 1;
                    this.decay = Math.random() * .015 + .01 }
                update() { this.x += this.vx;
                    this.y += this.vy; if (this.type === 'crumb') this.vy += .08; if (this.type === 'sparkle' || this.type ===
                        'note') this.vy -= .03;
                    this.life -= this.decay }
                draw(c) { c.save();
                    c.globalAlpha = this.life; if (this.type === 'heart') { c.fillStyle = '#FF6F91';
                        c.font = '8px monospace';
                        c.fillText('❤️', this.x, this.y) } else if (this.type === 'zzz') { c.fillStyle = '#B0A8B9';
                        c.font = 'bold 9px monospace';
                        c.fillText('Zzz', this.x, this.y) } else if (this.type === 'crumb') { c.fillStyle = '#C89666';
                        c.fillRect(~~this.x, ~~this.y, 2, 2) } else if (this.type === 'paw') { c.fillStyle =
                        'rgba(180,160,180,0.4)';
                    c.fillRect(~~this.x, ~~this.y, 3, 2);
                    c.fillRect(~~(this.x - 1), ~~(this.y - 1), 1, 1);
                    c.fillRect(~~(this.x + 1), ~~(this.y - 1), 1, 1);
                    c.fillRect(~~(this.x + 3), ~~(this.y - 1), 1, 1) } else if (this.type === 'sparkle') { c.fillStyle =
                            '#FFD700';
                        c.fillRect(~~this.x, ~~this.y, 2, 2);
                        c.fillStyle = '#FFF';
                        c.fillRect(~~this.x + .5, ~~this.y + .5, 1, 1) } else if (this.type === 'note') { c.fillStyle = P
                            .toscaBlue;
                        c.font = '10px monospace';
                        c.fillText('♪', this.x, this.y) } else if (this.type === 'water') { c.fillStyle = '#87CEEB';
                        c.beginPath();
                        c.arc(this.x, this.y, 2, 0, Math.PI * 2);
                        c.fill() }
                    c.restore() }
            }
            class Toy {
                constructor(x, y, t) { this.x = x;
                    this.y = y;
                    this.type = t;
                    this.vx = 0;
                    this.vy = 0;
                    this.radius = t === 'ball' ? 10 : 12;
                    this.isDragged = !1;
                    this.rot = 0 }
                update() { if (this.isDragged) return;
                    this.vy += .2;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= .96;
                    this.vy *= .96; if (this.y + this.radius > FL) { this.y = FL - this.radius;
                        this.vy = -this.vy * .4;
                        this.vx *= .8 } if (this.x - this.radius < 0) { this.x = this.radius;
                        this.vx = -this.vx * .5 } if (this.x + this.radius > W) { this.x = W - this.radius;
                        this.vx = -this.vx * .5 }
                    this.rot += this.vx * .05 }
                draw(c) { c.save();
                    c.translate(~~this.x, ~~this.y); if (this.type === 'ball') { c.rotate(this.rot);
                        c.fillStyle = P.ball;
                        c.beginPath();
                        c.arc(0, 0, this.radius, 0, Math.PI * 2);
                        c.fill();
                        c.fillStyle = lightenColor(P.ball, 0.3);
                        c.fillRect(-this.radius, -3, this.radius * 2, 6) } else if (this.type === 'fish') { c.rotate(this
                            .rot);
                        c.fillStyle = P.fish;
                        c.fillRect(-10, -5, 16, 10);
                        c.fillStyle = darkenColor(P.fish, 0.2);
                        c.fillRect(-10, -1, 16, 4);
                        c.fillStyle = '#A29BFE';
                        c.fillRect(6, -7, 4, 14);
                        c.fillStyle = P.white;
                        c.fillRect(-7, -3, 2, 2);
                        c.fillStyle = P.black;
                        c.fillRect(-7, -3, 1, 1) }
                    c.restore() }
            }
            class Rat {
                constructor() { this.x = W / 2 + 40;
                    this.y = FL;
                    this.animTime = 0;
                    this.facing = -1;
                    this.targetX = this.x;
                    this.isBeingCarried = !1;
                    this.carriedByCat = !1;
                    this.isSleeping = !1;
                    this.states = { IDLE: 0, WALKING: 1, SLEEPING: 2, JUMPING: 3, ON_CAT: 4 };
                    this.currentState = 0;
                    this.holeMode = 'none';
                    this.holeTimer = 0;
                    this.peekAnim = 0;
                    this.jumpVy = 0;
                    this.onCatTimer = 0;
                    this.catOffsetX = 0;
                    this.catOffsetY = 0 }
                update() { this.animTime++; if (this.isBeingCarried) return; if (this.currentState === 4 && !this
                        .carriedByCat) { this.onCatTimer--;
                        this.x = cat.x + this.catOffsetX;
                        this.y = cat.y + this.catOffsetY + Math.sin(this.animTime * .2) * .5; if (this.onCatTimer <= 0 || cat
                            .currentState === 8) { this.currentState = 3;
                            this.jumpVy = -3;
                            this.y = cat.y - 10 } return } if (this.currentState === 3) { this.jumpVy += .3;
                        this.y += this.jumpVy;
                        this.x += this.facing * .5; if (this.y >= FL) { this.y = FL;
                            this.currentState = 0 } return } if (this.carriedByCat) return; if (this.holeMode !== 'none') {
                        this.holeTimer++; if (this.holeMode === 'inside') { this.x = ratHole.x + ratHole.w / 2;
                            this.y = FL; if (this.holeTimer > 120) { this.holeMode = 'peeking';
                                this.holeTimer = 0;
                                this.peekAnim = 0 } } else if (this.holeMode === 'peeking') { this.x = ratHole.x + ratHole.w /
                                2;
                            this.peekAnim = Math.min(this.peekAnim + .08, 1);
                            this.y = FL + (1 - this.peekAnim) * 8; if (this.holeTimer > 200 && Math.random() < .01) { if (cheese
                                    .active && Math.random() < .7) { this.holeMode = 'eating';
                                    this.holeTimer = 0;
                                    this.targetX = cheese.x;
                                    this.currentState = 1;
                                    this.y = FL } else { this.holeMode = 'none';
                                    this.currentState = 0;
                                    this.y = FL } } } else if (this.holeMode === 'eating') { let d = this.targetX - this.x;
                            this.facing = d > 0 ? 1 : -1;
                            this.x += Math.sign(d) * .8; if (Math.abs(d) < 4) { this.holeTimer++; if (this.holeTimer > 60) {
                                    cheese.nibblesLeft--; if (cheese.nibblesLeft <= 0) { cheese.active = !1;
                                        cheese.regenTimer = 300 }
                                    this.holeMode = 'returning';

                c.fillStyle = n ? '#4A6A6A' : '#7AAAA0';
                c.fillRect(sx + 24, sy - 10, 4, 10);
                c.fillStyle = n ? '#6A5A4A' : '#B09A7A';
                c.fillRect(sx + 28, sy - 6, 3, 6); }

            function drawPosters(c, n) { let px = 48,
                    py = 66;
                c.fillStyle = 'rgba(0,0,0,0.3)';
                c.fillRect(px + 1, py + 1, 14, 18);
                c.fillStyle = n ? '#3A2A2A' : '#8B5A2B';
                c.fillRect(px, py, 14, 18);
                c.fillStyle = n ? '#FFF5E6' : '#FFF9E6';
                c.fillRect(px + 1, py + 1, 12, 16);
                c.fillStyle = '#FF6B6B';
                c.beginPath();
                c.arc(px + 7, py + 9, 4, 0, Math.PI * 2);
                c.fill();
                c.fillStyle = '#FFD700';
                c.fillRect(px + 5, py + 6, 4, 4);
                c.fillStyle = '#6B9BD2';
                c.fillRect(px + 4, py + 12, 6, 3);
                c.fillStyle = 'rgba(0,0,0,0.3)';
                c.fillRect(px + 1, py + 23, 14, 18);
                c.fillStyle = n ? '#3A2A2A' : '#8B5A2B';
                c.fillRect(px, py + 22, 14, 18);
                c.fillStyle = n ? '#FFF5E6' : '#FFF9E6';
                c.fillRect(px + 1, py + 23, 12, 16);
                c.fillStyle = '#228B22';
                c.fillRect(px + 3, py + 27, 8, 8);
                c.fillStyle = '#8B4513';
                c.fillRect(px + 5, py + 31, 4, 6);
                c.fillStyle = '#FFD700';
                c.beginPath();
                c.arc(px + 7, py + 34, 3, 0, Math.PI * 2);
                c.fill(); }

            function drawTV(c, n) {
                c.fillStyle = n ? '#3A2A1A' : '#5C4033';
                c.fillRect(158, FL - 35, 35, 35);
                c.fillStyle = lightenColor(n ? '#3A2A1A' : '#5C4033', 0.2);
                c.fillRect(158, FL - 35, 35, 2);
                c.fillStyle = '#1a1a1a';
                c.fillRect(160, FL - 60, 31, 26);
                if (n) {
                    c.fillStyle = 'rgba(100,150,255,0.15)';
                    c.beginPath();
                    c.ellipse(175, FL - 47, 25, 20, 0, 0, Math.PI * 2);
                    c.fill();
                    c.fillStyle = '#2a3a5a';
                    c.fillRect(162, FL - 58, 27, 22);
                    let t = Date.now() / 300,
                        cx = 175,
                        cy = FL - 47;
                    for (let i = 0; i < 3; i++) { let ang = t + i * 2.0,
                            rx = Math.cos(ang) * 4,
                            ry = Math.sin(ang) * 3;
                        c.fillStyle = `hsl(${(i*60+120)%360},70%,65%)`;
                        c.fillRect(cx + rx - 2, cy + ry - 2, 4, 4); }
                } else { c.fillStyle = '#4a6a9a';
                    c.fillRect(162, FL - 58, 27, 22); }
                c.fillStyle = '#2a2a2a';
                c.fillRect(168, FL - 34, 3, 2);
                c.fillRect(180, FL - 34, 3, 2);
            }

            function drawBirds(c, n) {
                if (n) return;
                const now = Date.now() / 1800;
                c.save();
                for (let bird of fixedBirds) {
                    let bx = bird.x;
                    let by = bird.y + Math.sin(now + bird.wingPhase) * 1.5;
                    c.fillStyle = 'rgba(0,0,0,0.15)';
                    c.fillRect(bx + 1, by + 1, 4, 2);
                    c.fillStyle = '#FFFFFF';
                    c.fillRect(bx, by, 4, 2);
                    c.fillRect(bx + 3, by - 1, 2, 2);
                    c.fillRect(bx + 1, by - 2, 2, 1);
                    c.fillStyle = '#E0E0E0';
                    c.fillRect(bx + 2, by + 1, 2, 1);
                }
                c.restore();
            }

            function drawStars(c) {
                c.save();
                for (let s of fixedStars) {
                    c.fillStyle = 'rgba(255,255,220,0.6)';
                    c.beginPath();
                    c.arc(s.x, s.y, 1.8, 0, Math.PI * 2);
                    c.fill();
                    c.fillStyle = '#FFF';
                    c.fillRect(s.x, s.y, 1, 1);
                }
                c.restore();
            }

            function drawStringLights(c, n) {
                if (!S.lightsOn) return;
                c.save();
                c.beginPath();
                c.moveTo(0, 8);
                c.quadraticCurveTo(W / 4, 18, W / 2, 10);
                c.quadraticCurveTo(3 * W / 4, 2, W, 14);
                c.strokeStyle = n ? '#555' : '#C9B99A';
                c.lineWidth = 1;
                c.stroke();
                const lp = [{ x: W * .08, y: 10 }, { x: W * .2, y: 15 }, { x: W * .35, y: 13 }, { x: W * .5, y: 10 }, { x: W *
                        .65, y: 7 }, { x: W * .8, y: 8 }, { x: W * .92, y: 13 }],
                    cols = ['#FFD700', '#FF6F91', '#7BC67E', '#6B9BD2', '#FFA500', '#FFD700', '#FF6F91'];
                for (let i = 0; i < lp.length; i++) {
                    let p = lp[i];
                    c.fillStyle = darkenColor(cols[i], 0.3);
                    c.beginPath();
                    c.arc(p.x, p.y + 1, 7, 0, Math.PI * 2);
                    c.fill();
                    c.fillStyle = cols[i];
                    c.beginPath();
                    c.arc(p.x, p.y, 7, 0, Math.PI * 2);
                    c.fill();
                    c.fillStyle = '#FFF';
                    c.globalAlpha = .9;
                    c.beginPath();
                    c.arc(p.x - .5, p.y - 1, 3, 0, Math.PI * 2);
                    c.fill();
                }
                c.restore();
            }

            function drawMoonGlow(c) {
                let mx = W / 2 + 10,
                    my = 40;
                c.fillStyle = 'rgba(255,255,220,0.2)';
                c.beginPath();
                c.arc(mx, my, 18, 0, Math.PI * 2);
                c.fill();
            }

            function drawLightSwitch(c) { let sx = lightSwitch.x,
                    sy = lightSwitch.y;
                c.fillStyle = '#DDD';
                c.fillRect(sx, sy, lightSwitch.w, lightSwitch.h);
                c.fillStyle = lightenColor('#DDD', 0.3);
                c.fillRect(sx, sy, lightSwitch.w, 2);
                c.fillStyle = '#666';
                c.fillRect(sx + 2, sy + 2, 6, 4);
                c.fillRect(sx + 2, sy + 8, 6, 4);
                c.fillStyle = S.lightsOn ? '#FFD700' : '#555';
                c.fillRect(sx + 3, sy + 3, 4, 2);
                c.fillStyle = S.lightsOn ? '#FFD700' : '#555';
                c.fillRect(sx + 3, sy + 9, 4, 2); }

            function drawGlassCabinet(c, n) { let gc = glassCabinet;
                let frame = n ? '#4A3A2A' : '#8B5A2B';
                c.fillStyle = frame;
                c.fillRect(gc.x, gc.y, gc.w, gc.h + 18);
                c.fillStyle = lightenColor(frame, 0.2);
                c.fillRect(gc.x, gc.y, gc.w, 2);
                c.fillStyle = n ? 'rgba(100,150,200,0.3)' : 'rgba(200,230,255,0.5)';
                c.fillRect(gc.x + 3, gc.y + 3, gc.w - 6, gc.h + 12);
                c.fillStyle = n ? '#3A2A1A' : '#6B4A2B';
                c.fillRect(gc.x + 2, gc.y + 18, gc.w - 4, 2);
                c.fillRect(gc.x + 2, gc.y + 36, gc.w - 4, 2);
                c.fillRect(gc.x + 2, gc.y + 54, gc.w - 4, 2);
                drawArcanine(c, gc.x + 12, gc.y + 16, n);
                drawEspeon(c, gc.x + 30, gc.y + 16, n);
                drawPikachu(c, gc.x + 36, gc.y + 34, n);
                drawLeafeon(c, gc.x + 12, gc.y + 34, n);
                drawIncineroar(c, gc.x + 28, gc.y + 34, n);
                drawDendenne(c, gc.x + 12, gc.y + 52, n);
                drawGengar(c, gc.x + 32, gc.y + 52, n);
                c.fillStyle = 'rgba(255,255,255,0.2)';
                c.fillRect(gc.x + 4, gc.y + 4, 2, gc.h - 8); }

            function drawTreat(c) { if (!S.treatSpawned) return;
                let tx = S.treatX,
                    ty = S.treatY;
                c.save();
                let bob = Math.sin(Date.now() / 300) * 1.5;
                c.fillStyle = 'rgba(0,0,0,0.2)';
                c.beginPath();
                c.arc(tx + 1, ty + bob - 2, 5, 0, Math.PI * 2);
                c.fill();
                c.fillStyle = '#F4C882';
                c.beginPath();
                c.arc(tx, ty + bob - 3, 5, 0, Math.PI * 2);
                c.fill();
                c.fillStyle = '#D49A5A';
                c.beginPath();
                c.arc(tx, ty + bob - 3, 3, 0, Math.PI * 2);
                c.fill();
                c.fillStyle = '#FFF';
                c.fillRect(tx - 1, ty + bob - 5, 2, 2);
                c.fillStyle = '#FF6F91';
                c.beginPath();
                c.arc(tx - 2, ty + bob - 4, 1.5, 0, Math.PI * 2);
                c.fill();
                c.restore(); }

            function drawEnv(c, n) {
                let wallBase = n ? P.wallNight : P.wallDay;
                c.fillStyle = wallBase;
                c.fillRect(0, 0, W, H);
                for (let y = 0; y < FL; y += 4) {
                    c.fillStyle = lightenColor(wallBase, 0.03);
                    c.fillRect(0, y, W, 2);
                }
                drawStringLights(c, n);
                let floorBase = n ? P.floorNight : P.floorDay;
                c.fillStyle = floorBase;
                c.fillRect(0, FL, W, 24);
                for (let y = FL; y < H; y += 6) {
                    c.fillStyle = darkenColor(floorBase, 0.05);
                    c.fillRect(0, y, W, 1);
                }
                c.fillStyle = darkenColor(floorBase, 0.2);
                c.fillRect(0, FL, W, 2);
                c.fillStyle = n ? '#4D3B56' : '#E3CEB1';
                c.fillRect(0, FL, W, 3);
                drawRug(c, n);
                c.fillStyle = n ? '#1C1A27' : '#B3DEE5';
                c.fillRect(W / 2 - 25, 25, 50, 40);
                if (n) { drawStars(c);
                    drawMoonGlow(c);
                    c.fillStyle = '#F5F5DC';
                    c.beginPath();
                    c.arc(W / 2 + 10, 40, 8, 0, Math.PI * 2);
                    c.fill(); } else { c.fillStyle = '#FFD700';
                    c.beginPath();
                    c.arc(W / 2 - 8, 38, 7, 0, Math.PI * 2);
                    c.fill();
                    drawBirds(c, n); }
                c.strokeStyle = darkenColor(n ? '#3D3D43' : '#FFF', 0.3);
                c.lineWidth = 2;
                c.strokeRect(W / 2 - 25, 25, 50, 40);
                c.strokeStyle = lightenColor(n ? '#3D3D43' : '#FFF', 0.3);
                c.strokeRect(W / 2 - 24, 26, 48, 38);
                c.beginPath();
                c.moveTo(W / 2, 25);
                c.lineTo(W / 2, 65);
                c.moveTo(W / 2 - 25, 45);
                c.lineTo(W / 2 + 25, 45);
                c.stroke();
                drawLightSwitch(c);
                drawPosters(c, n);
                drawFrame(c, 5, 10, 52, 36, n);
                c.fillStyle = '#4A2311';
                c.fillRect(15, 16, 12, 12);
                c.fillStyle = '#FFDFC4';
                c.fillRect(17, 18, 8, 8);
                c.fillStyle = '#000';
                c.fillRect(18, 21, 2, 2);
                c.fillRect(22, 21, 2, 2);
                c.fillStyle = '#FFB3BA';
                c.fillRect(19, 24, 4, 1);
                c.fillStyle = '#6C5B7B';
                c.fillRect(15, 28, 12, 10);
                c.fillStyle = '#2C3E50';
                c.fillRect(35, 16, 12, 12);
                c.fillStyle = '#FFDFC4';
                c.fillRect(37, 18, 8, 8);
                c.fillStyle = '#000';
                c.fillRect(38, 21, 2, 2);
                c.fillRect(42, 21, 2, 2);
                c.fillStyle = '#FFB3BA';
                c.fillRect(39, 24, 4, 1);
                c.fillStyle = '#C06C84';
                c.fillRect(35, 28, 12, 10);
                c.fillStyle = '#E68A4E';
                c.fillRect(25, 32, 12, 8);
                c.fillStyle = '#FFF';
                c.fillRect(27, 34, 8, 6);
                c.fillStyle = '#3D3D43';
                c.fillRect(29, 32, 4, 3);
                drawGlassCabinet(c, n);
                drawSmallShelf(c, n);
                drawClock(c, n);
                drawTV(c, n);
                drawRatHole(c, n);
                drawCheese(c, n);
                c.fillStyle = n ? '#5A3D2B' : '#8B5A2B';
                c.fillRect(bed.x, bed.y + 4, bed.w, 8);
                c.fillStyle = lightenColor(n ? '#5A3D2B' : '#8B5A2B', 0.2);
                c.fillRect(bed.x, bed.y + 4, bed.w, 2);
                c.fillStyle = n ? '#7A729A' : '#A29BFE';
                c.fillRect(bed.x + 2, bed.y, bed.w - 4, 8);
                c.fillStyle = n ? '#D5A6B0' : '#FFB3BA';
                c.fillRect(bed.x + 6, bed.y - 2, 16, 6);
                c.fillStyle = lightenColor(n ? '#D5A6B0' : '#FFB3BA', 0.3);
                c.fillRect(bed.x + 7, bed.y - 3, 14, 2);
                drawWaterBowl(c, n);
                drawGuitar(c, n);
                let cB = n ? P.woodNightDark : P.woodDark,
                    cF = n ? P.woodNightLight : P.woodLight;
                c.fillStyle = cB;
                c.fillRect(cabinet.x, cabinet.y, cabinet.w, cabinet.h);
                c.fillStyle = lightenColor(cB, 0.2);
                c.fillRect(cabinet.x, cabinet.y, cabinet.w, 2);
                c.fillStyle = darkenColor(cB, 0.2);
                c.fillRect(cabinet.x, cabinet.y + cabinet.h - 2, cabinet.w, 2);
                drawSunflower(c, cabinet.x + cabinet.w / 2, cabinet.y - 10, n);
                if (cabinet.isUpperOpen) { c.fillStyle = '#1A110B';
                    c.fillRect(cabinet.x + 2, cabinet.y + 2, cabinet.w - 4, cabinet.h / 2 - 3);
                    c.fillStyle = cF;
                    c.fillRect(cabinet.x + 4, cabinet.y + 4, cabinet.w - 4, cabinet.h / 2 - 2);
                    let hX = cabinet.x + 6,
                        hY = cabinet.y + 5;
                    c.fillStyle = '#FFF9E6';
                    c.fillRect(hX, hY, 10, 10);
                    c.strokeStyle = '#D5A069';
                    c.lineWidth = 1;
                    c.strokeRect(hX, hY, 10, 10);
                    c.fillStyle = '#2C2C2C';
                    c.fillRect(hX + 2, hY + 1, 6, 4);
                    c.fillRect(hX + 1, hY + 4, 8, 2);
                    c.fillStyle = '#6C5B7B';
                    c.font = '5px monospace';
                    c.fillText('Hat', hX + 1, hY + 9);
                    let oX = cabinet.x + 20,
                        oY = cabinet.y + 5;
                    c.fillStyle = '#FFF9E6';
                    c.fillRect(oX, oY, 10, 10);
                    c.strokeRect(oX, oY, 10, 10);
                    c.fillStyle = '#E8A0BF';
                    c.fillRect(oX + 2, oY + 2, 6, 5);
                    c.fillStyle = '#D4849F';
                    c.fillRect(oX + 3, oY + 3, 4, 2);
                    c.fillStyle = '#6C5B7B';
                    c.fillText('Fit', oX + 1, oY + 9); } else { c.fillStyle = cF;
                    c.fillRect(cabinet.x + 2, cabinet.y + 2, cabinet.w - 4, cabinet.h / 2 - 3);
                    c.fillStyle = '#FFD700';
                    c.fillRect(cabinet.x + cabinet.w / 2 - 2, cabinet.y + 6, 4, 2); }
                if (cabinet.isLowerOpen) { c.fillStyle = '#1A110B';
                    c.fillRect(cabinet.x + 2, cabinet.y + cabinet.h / 2 + 1, cabinet.w - 4, cabinet.h / 2 - 3);
                    c.fillStyle = cF;
                    c.fillRect(cabinet.x + 6, cabinet.y + cabinet.h / 2 + 6, cabinet.w - 4, cabinet.h / 2 - 3);
                    let lX = cabinet.x + 8,
                        lY = cabinet.y + cabinet.h / 2 + 8;
                    c.fillStyle = '#FFF9E6';
                    c.fillRect(lX, lY, 18, 12);
                    c.strokeStyle = '#D5A069';
                    c.lineWidth = 1;
                    c.beginPath();
                    c.moveTo(lX, lY);
                    c.lineTo(lX + 9, lY + 6);
                    c.lineTo(lX + 18, lY);
                    c.stroke();
                    c.fillStyle = '#C0392B';
                    c.fillRect(lX + 7, lY + 4, 4, 3); } else { c.fillStyle = cF;
                    c.fillRect(cabinet.x + 2, cabinet.y + cabinet.h / 2 + 1, cabinet.w - 4, cabinet.h / 2 - 3);
                    c.fillStyle = '#FFD700';
                    c.fillRect(cabinet.x + cabinet.w / 2 - 2, cabinet.y + cabinet.h / 2 + 5, 4, 2); }
                drawCatClimber(c, n);
            }

            function loop() {
                S.timeOfDay = (S.timeOfDay + 1) % 2400;
                let n = S.timeOfDay > 1200;
                document.body.style.backgroundColor = n ? '#2D243E' : '#F0E6EF';
                document.getElementById('status-msg').textContent = n ? '🌙 Night Time' : '☀️ Cozy Day';
                if (!cheese.active) { cheese.regenTimer--; if (cheese.regenTimer <= 0) { cheese.active = !0;
                        cheese.nibblesLeft = 3 } }
                drawEnv(ctx, n);
                if (Math.random() < .015) { ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(Math.random() * W, Math.random() * (H - 40), 1, 1); }
                if (tugActive && Math.random() < .12) { tugScore -= 1.2 * S.fatLevel;
                    updateTugMeter();
                    checkTug(); }
                cat.update();
                rat.update();
                ballToy.update();
                fishToy.update();
                if (S.foodSpawned) { ctx.fillStyle = '#964B00';
                    ctx.fillRect(S.foodX - 8, S.foodY - 4, 16, 5);
                    ctx.fillStyle = '#D2691E';
                    ctx.fillRect(S.foodX - 6, S.foodY - 6, 12, 3); }
                drawTreat(ctx);
                particles = particles.filter(p => { p.update();
                    p.draw(ctx); return p.life > 0 });
                cat.draw(ctx);
                if (!rat.carriedByCat && rat.currentState !== 4) { rat.draw(ctx); }
                if (rat.currentState === 4) rat.draw(ctx);
                drawToyPile(ctx, n);
                ballToy.draw(ctx);
                fishToy.draw(ctx);
                drawLetterOverlay(ctx);
                requestAnimationFrame(loop);
            }
            window.addEventListener('DOMContentLoaded', () => { loadGame();
                setupInput();
                requestAnimationFrame(loop); });
        })();
    </script>
</body>
</html>
